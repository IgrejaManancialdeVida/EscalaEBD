  <script type="module" id="firebase-bootstrap">
    import { initializeApp }                        from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js';
    import { getFirestore, doc, getDoc, setDoc }    from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js';

    const firebaseConfig = {
      apiKey:            "AIzaSyBzlD2wNAazD2CA8W0CJqc062AJ3o5Zn6A",
      authDomain:        "escala-ebd-8875a.firebaseapp.com",
      projectId:         "escala-ebd-8875a",
      storageBucket:     "escala-ebd-8875a.firebasestorage.app",
      messagingSenderId: "324358454357",
      appId:             "1:324358454357:web:c1096ce6989ae08ad828dc",
      measurementId:     "G-CVT3Z9SDV4"
    };

    const _fbApp = initializeApp(firebaseConfig);
    const _db    = getFirestore(_fbApp);
    const _docRef = doc(_db, 'dados_app', 'ebd_app_v2');

    // Expõe helpers no window para o script não-module aceder
    window._fbLoadApp = async function() {
      const snap = await getDoc(_docRef);
      return snap.exists() ? snap.data() : null;
    };
    window._fbSaveApp = async function(data) {
      await setDoc(_docRef, data, { merge: false });
    };
    window._fbReady = true;

    // Dispara evento para o script principal saber que o Firebase está pronto
    window.dispatchEvent(new Event('firebase-ready'));
  </script>

  <style>
    :root {
      --ink: #18181b;
      --ink-soft: #52525b;
      --ink-muted: #a1a1aa;
      --surface: #f4f4f5;
      --surface-2: #ffffff;
      --border: #e4e4e7;
      --border-soft: #f0f0f1;
      --green: #2d6a4f;
      --green-light: #d8f3dc;
      --green-accent: #40916c;
      --radius-card: 20px;
      --radius-btn: 14px;
      --shadow-card: 0 1px 2px rgba(0,0,0,.04), 0 4px 20px rgba(0,0,0,.06);
      --shadow-elevated: 0 8px 40px rgba(0,0,0,.12);
    }

    * { -webkit-tap-highlight-color: transparent; box-sizing: border-box; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--surface);
      min-height: 100vh;
      padding-bottom: 8rem;
      color: var(--ink);
    }

    h1,h2,h3,.font-serif { font-family: 'DM Serif Display', serif; }

    /* ── Animations ── */
    @keyframes fadeUp  { from{opacity:0;transform:translateY(16px)} to{opacity:1;transform:translateY(0)} }
    @keyframes fadeIn  { from{opacity:0} to{opacity:1} }
    @keyframes pulse2  { 0%,100%{opacity:1} 50%{opacity:.45} }
    @keyframes slideUp { from{transform:translateY(110%);opacity:0} to{transform:translateY(0);opacity:1} }
    @keyframes spin    { to{transform:rotate(360deg)} }
    @keyframes shimmer { from{background-position:-200% 0} to{background-position:200% 0} }

    .fade-up  { animation: fadeUp  .5s cubic-bezier(.22,1,.36,1) both }
    .fade-in  { animation: fadeIn  .35s ease both }
    .slide-up { animation: slideUp .45s cubic-bezier(.16,1,.3,1) both }
    .pulsing  { animation: pulse2 1.6s ease-in-out infinite }
    .spinning { animation: spin .8s linear infinite }

    .delay-1{animation-delay:.06s}.delay-2{animation-delay:.12s}.delay-3{animation-delay:.18s}.delay-4{animation-delay:.24s}

    /* ── Scrollbar ── */
    ::-webkit-scrollbar { width:3px }
    ::-webkit-scrollbar-track { background:transparent }
    ::-webkit-scrollbar-thumb { background:var(--border);border-radius:4px }

    /* ── Cards ── */
    .card {
      background: var(--surface-2);
      border-radius: var(--radius-card);
      box-shadow: var(--shadow-card);
      border: 1px solid rgba(0,0,0,.04);
      transition: box-shadow .2s, transform .15s;
    }
    .card:active { transform:scale(.988); box-shadow:0 1px 4px rgba(0,0,0,.06); }

    /* ── Badges ── */
    .badge-confirmado { background:#dcfce7;color:#15803d;font-weight:700 }
    .badge-pendente   { background:#fef9c3;color:#a16207;font-weight:700 }
    .badge-disponivel { background:#dbeafe;color:#1d4ed8;font-weight:700 }
    .badge-ausente    { background:#fee2e2;color:#b91c1c;font-weight:700 }

    /* ── Navigation ── */
    .nav-btn {
      transition: color .18s, background .18s;
      border-radius: 10px;
      padding: 5px 10px;
      font-size: .8rem;
      font-weight: 600;
      letter-spacing: -.01em;
    }
    .nav-btn.active { background: var(--ink); color: #fff; }
    .nav-btn:not(.active) { color: var(--ink-muted); }

    /* ── Header ── */
    header {
      background: rgba(244,244,245,.94);
      backdrop-filter: blur(16px) saturate(180%);
      -webkit-backdrop-filter: blur(16px) saturate(180%);
      border-bottom: 1px solid var(--border-soft);
    }

    nav {
      background: rgba(244,244,245,.9);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border-soft);
    }

    /* ── Modal ── */
    #modal-overlay {
      backdrop-filter: blur(6px) saturate(120%);
      background: rgba(10,10,10,.4);
    }
    #bottom-sheet {
      border-radius: 28px 28px 0 0;
      max-height: 92vh;
      overflow-y: auto;
      border-top: 1px solid rgba(255,255,255,.5);
    }

    /* ── Toggle ── */
    .toggle { position:relative;width:44px;height:26px }
    .toggle input { opacity:0;width:0;height:0 }
    .slider { position:absolute;inset:0;background:#d4d4d8;border-radius:99px;cursor:pointer;transition:.25s }
    .slider::before { content:'';position:absolute;height:20px;width:20px;left:3px;bottom:3px;background:#fff;border-radius:50%;transition:.25s;box-shadow:0 1px 4px rgba(0,0,0,.2) }
    input:checked+.slider { background: var(--green-accent) }
    input:checked+.slider::before { transform:translateX(18px) }

    /* ── Month chips ── */
    .month-chip {
      padding: 7px 16px;
      border-radius: 99px;
      font-size: .78rem;
      font-weight: 600;
      cursor: pointer;
      border: 1.5px solid transparent;
      transition: all .2s;
      white-space: nowrap;
      letter-spacing: .01em;
    }
    .month-chip.active { background: var(--ink); color:#fff; }
    .month-chip:not(.active) { background:#fff; color: var(--ink-soft); border-color: var(--border); }

    /* ── Inputs ── */
    input, textarea, select { outline: none; }

    .inp {
      width: 100%;
      border: 1.5px solid var(--border);
      border-radius: var(--radius-btn);
      padding: .8rem 1rem;
      font-size: .9rem;
      color: var(--ink);
      font-family: 'DM Sans', sans-serif;
      transition: border .2s, box-shadow .2s;
      background: #fff;
    }
    .inp:focus { border-color: var(--green-accent); box-shadow: 0 0 0 3px rgba(64,145,108,.15); }
    .inp::placeholder { color: var(--ink-muted); }

    /* ── Buttons ── */
    .btn-primary {
      background: var(--ink);
      color: #fff;
      font-weight: 700;
      border-radius: var(--radius-btn);
      padding: .9rem 1.25rem;
      font-size: .88rem;
      font-family: 'DM Sans', sans-serif;
      cursor: pointer;
      transition: background .2s, transform .15s, box-shadow .2s;
      border: none;
      width: 100%;
      letter-spacing: -.01em;
    }
    .btn-primary:hover { background: #27272a; }
    .btn-primary:active { transform:scale(.97); }

    .btn-ghost {
      background: var(--surface);
      color: var(--ink-soft);
      font-weight: 600;
      border-radius: 12px;
      padding: .65rem 1rem;
      font-size: .82rem;
      font-family: 'DM Sans', sans-serif;
      cursor: pointer;
      transition: background .2s, color .15s;
      border: none;
    }
    .btn-ghost:hover { background: #e4e4e7; color: var(--ink); }

    /* ── View pill ── */
    .view-pill {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: #fff;
      border: 1.5px solid var(--border);
      border-radius: 99px;
      padding: 5px 14px 5px 6px;
      font-size: .76rem;
      font-weight: 700;
      color: var(--ink-soft);
      cursor: pointer;
      transition: border-color .2s, box-shadow .2s;
      letter-spacing: .01em;
    }
    .view-pill:hover { border-color: #a1a1aa; box-shadow: 0 2px 8px rgba(0,0,0,.07); }
    .view-pill-dot {
      width: 22px; height: 22px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: .68rem;
    }

    /* ── Loading spinner ── */
    .loading-spinner { border:3px solid var(--border);border-top-color:var(--green-accent);border-radius:50%;width:28px;height:28px;animation:spin .7s linear infinite;margin:0 auto }

    /* ── Sunday card accent ── */
    .sunday-card { border-left: 3px solid var(--cls-line, var(--green)); }

    /* ── Section headers ── */
    .section-label {
      font-size: .68rem;
      font-weight: 700;
      letter-spacing: .1em;
      text-transform: uppercase;
      color: var(--ink-muted);
    }

    /* ── Progress bar ── */
    .progress-track { background: #f0f0f1; border-radius: 99px; height: 6px; overflow:hidden; }
    .progress-fill  { background: linear-gradient(90deg, var(--green) 0%, var(--green-accent) 100%); border-radius: 99px; height: 6px; transition: width .6s cubic-bezier(.22,1,.36,1); }

    /* ── Icon button ── */
    .icon-btn {
      width: 36px; height: 36px;
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      background: var(--surface);
      border: none; cursor: pointer;
      color: var(--ink-soft);
      transition: background .15s, color .15s;
    }
    .icon-btn:hover { background: var(--border); color: var(--ink); }

    /* ── Stat pill ── */
    .stat-pill {
      display: inline-flex; align-items: center; gap: 4px;
      padding: 3px 10px;
      border-radius: 99px;
      font-size: .72rem;
      font-weight: 700;
      background: var(--surface);
      color: var(--ink-soft);
      border: 1.5px solid var(--border);
    }

    /* ── Hero card gradient overlay ── */
    .hero-card {
      background: linear-gradient(135deg, #1c4a2e 0%, #2d7a4f 50%, #40916c 100%);
      border-radius: var(--radius-card);
      position: relative;
      overflow: hidden;
    }
    .hero-card::before {
      content: '';
      position: absolute;
      inset: 0;
      background: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23ffffff' fill-opacity='0.04'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E") repeat;
      opacity: .5;
    }
    .hero-card * { position: relative; z-index: 1; }
  </style>

  <script>
  /* ================================================================
     CONSTANTS & DEFAULT CONFIG
  ================================================================ */
  const APP_VERSION = '2025-v2';
  const STORAGE_KEY = 'ebd_app_v2';
  const INSTALL_DATE = new Date().toISOString().split('T')[0]; // today = start of history

  const DEFAULT_CONFIG = {
    igrejaNome: 'Igreja EBD',
    horario: '09:00',
    diaSemana: 0, // 0 = domingo
    observacao: '',
    adminPin: '1234',
    classes: [
      { id: 'soldadinhos', label: 'Soldadinhos de Cristo', emoji: '⚔️',  color: '#4e7e52' },
      { id: 'geracao',     label: 'Geração de Samuel',     emoji: '📖',  color: '#0ea5e9' },
      { id: 'jovens',      label: 'Jovens Conectados',     emoji: '🔗',  color: '#f59e0b' },
      { id: 'elshadai',    label: 'El Shadai',             emoji: '🕊️', color: '#a855f7' },
    ]
  };

  /* ================================================================
     STATE
  ================================================================ */
  let APP = { config: {}, escalas: {}, historico: [] };
  let currentMode = 'viewer'; // 'admin' | 'teacher:NAME' | 'viewer'
  let currentMonth = null; // 'YYYY-MM'
  let isLoading = false;

  /* ================================================================
     LOADING OVERLAY HELPERS
  ================================================================ */
  function showLoading(msg = 'Carregando dados…') {
    let el = document.getElementById('fb-loading-overlay');
    if (!el) {
      el = document.createElement('div');
      el.id = 'fb-loading-overlay';
      el.style.cssText = [
        'position:fixed','inset:0','z-index:9999',
        'background:rgba(250,250,249,.92)','backdrop-filter:blur(6px)',
        'display:flex','flex-direction:column',
        'align-items:center','justify-content:center','gap:16px',
        'font-family:DM Sans,sans-serif'
      ].join(';');
      el.innerHTML = `
        <div style="border:3px solid #e7e5e4;border-top-color:#3a6440;border-radius:50%;
                    width:36px;height:36px;animation:spin .7s linear infinite"></div>
        <p id="fb-loading-msg" style="font-size:.9rem;color:#57534e;font-weight:500"></p>`;
      document.body.appendChild(el);
    }
    document.getElementById('fb-loading-msg').textContent = msg;
    el.style.display = 'flex';
  }

  function hideLoading() {
    const el = document.getElementById('fb-loading-overlay');
    if (el) el.style.display = 'none';
  }

  function showOfflineBanner(show = true) {
    let el = document.getElementById('fb-offline-banner');
    if (!el && show) {
      el = document.createElement('div');
      el.id = 'fb-offline-banner';
      el.style.cssText = [
        'position:fixed','top:0','left:0','right:0','z-index:9998',
        'background:#fef2f2','color:#991b1b','font-size:.78rem','font-weight:600',
        'text-align:center','padding:6px 12px','font-family:DM Sans,sans-serif'
      ].join(';');
      el.textContent = '⚠️ Modo offline — alterações salvas localmente e sincronizadas ao reconectar.';
      document.body.appendChild(el);
    }
    if (el) el.style.display = show ? 'block' : 'none';
  }

  /* ================================================================
     FIRESTORE PERSISTENCE  (with localStorage offline fallback)
  ================================================================ */
  async function waitForFirebase(timeout = 5000) {
    if (window._fbReady) return true;
    return new Promise(resolve => {
      const t = setTimeout(() => resolve(false), timeout);
      window.addEventListener('firebase-ready', () => { clearTimeout(t); resolve(true); }, { once: true });
    });
  }

  async function loadFromStorage() {
    showLoading('Conectando ao Firebase…');
    const fbOk = await waitForFirebase();

    if (fbOk) {
      try {
        showLoading('Carregando escalas…');
        const data = await window._fbLoadApp();
        if (data && Object.keys(data).length) {
          APP = { config: {}, escalas: {}, historico: [], ...data };
          APP.config = { ...DEFAULT_CONFIG, ...APP.config };
          if (!APP.config.classes || !APP.config.classes.length) APP.config.classes = DEFAULT_CONFIG.classes;
          // Persist locally as backup
          try { localStorage.setItem(STORAGE_KEY, JSON.stringify(APP)); } catch(_) {}
        } else {
          // Primeira utilização — inicializa com defaults
          APP = { config: { ...DEFAULT_CONFIG }, escalas: {}, historico: [], installDate: INSTALL_DATE };
          await saveToStorage();
        }
        showOfflineBanner(false);
        hideLoading();
        return;
      } catch (err) {
        console.warn('[EBD] Firestore falhou, usando fallback local:', err);
      }
    }

    // ── Offline / Firebase indisponível ──
    showOfflineBanner(true);
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (raw) {
        const parsed = JSON.parse(raw);
        APP = { config: {}, escalas: {}, historico: [], ...parsed };
        APP.config = { ...DEFAULT_CONFIG, ...APP.config };
        if (!APP.config.classes || !APP.config.classes.length) APP.config.classes = DEFAULT_CONFIG.classes;
      } else {
        APP = { config: { ...DEFAULT_CONFIG }, escalas: {}, historico: [], installDate: INSTALL_DATE };
      }
    } catch (_) {
      APP = { config: { ...DEFAULT_CONFIG }, escalas: {}, historico: [], installDate: INSTALL_DATE };
    }
    hideLoading();
  }

  async function saveToStorage() {
    // Snapshot limpo (sem funções, sem undefined)
    const snapshot = JSON.parse(JSON.stringify(APP));

    // 1) Salva localmente imediatamente (resposta instantânea)
    try { localStorage.setItem(STORAGE_KEY, JSON.stringify(snapshot)); } catch(_) {}

    // 2) Persiste no Firestore de forma assíncrona
    const fbOk = await waitForFirebase(3000);
    if (fbOk) {
      try {
        await window._fbSaveApp(snapshot);
        showOfflineBanner(false);
      } catch (err) {
        console.warn('[EBD] Falha ao salvar no Firestore, dados mantidos localmente:', err);
        showOfflineBanner(true);
      }
    } else {
      showOfflineBanner(true);
    }
  }

  /* ================================================================
     UTILITIES
  ================================================================ */
  function cls(id) { return APP.config.classes.find(c => c.id === id); }

  function fmtDate(iso) {
    const [y,m,d] = iso.split('-').map(Number);
    return new Date(y,m-1,d).toLocaleDateString('pt-BR',{weekday:'long',day:'numeric',month:'long'});
  }
  function fmtShort(iso) {
    const [y,m,d] = iso.split('-').map(Number);
    return new Date(y,m-1,d).toLocaleDateString('pt-BR',{day:'2-digit',month:'short',year:'numeric'});
  }
  function fmtMonthLabel(ym) {
    const [y,m] = ym.split('-').map(Number);
    return new Date(y,m-1,1).toLocaleDateString('pt-BR',{month:'long',year:'numeric'});
  }
  function daysUntil(iso) {
    const today = new Date(); today.setHours(0,0,0,0);
    const [y,m,d] = iso.split('-').map(Number);
    const diff = Math.round((new Date(y,m-1,d)-today)/86400000);
    if (diff===0) return 'Hoje! 🎉';
    if (diff===1) return 'Amanhã';
    if (diff<0) return `${Math.abs(diff)} dias atrás`;
    return `em ${diff} dias`;
  }
  function toIso(date) { return date.toISOString().split('T')[0]; }

  function getNextEBD() {
    const d = new Date(); const day = d.getDay();
    const target = APP.config.diaSemana ?? 0;
    let diff = (target - day + 7) % 7;
    if (diff === 0) diff = 7;
    d.setDate(d.getDate()+diff); d.setHours(0,0,0,0);
    return toIso(d);
  }

  function getSundaysOfMonth(ym) {
    const [y,m] = ym.split('-').map(Number);
    const target = APP.config.diaSemana ?? 0;
    const sundays = [];
    const d = new Date(y,m-1,1);
    while (d.getMonth()===m-1) {
      if (d.getDay()===target) sundays.push(toIso(new Date(d)));
      d.setDate(d.getDate()+1);
    }
    return sundays;
  }

  function getAvailableMonths() {
    const now = new Date();
    const months = new Set();
    // Current + 5 future months
    for (let i=0; i<6; i++) {
      const d = new Date(now.getFullYear(), now.getMonth()+i, 1);
      months.add(`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`);
    }
    // Past months with data
    Object.keys(APP.escalas).forEach(k => {
      const ym = k.substring(0,7);
      months.add(ym);
    });
    return [...months].sort();
  }

  function statusBadge(status) {
    const map = {
      confirmado:['badge-confirmado','Confirmado','✓'],
      pendente:  ['badge-pendente',  'Pendente',  '⏳'],
      disponivel:['badge-disponivel','Disponível','○'],
      ausente:   ['badge-ausente',   'Ausente',   '✗'],
    };
    const [cls,lbl,ic] = map[status]||map.pendente;
    return `<span class="${cls} text-[11px] font-semibold px-2.5 py-1 rounded-full">${ic} ${lbl}</span>`;
  }

  function showToast(msg, duration=2500) {
    const t=document.getElementById('toast'), ti=document.getElementById('toast-inner');
    ti.textContent=msg; t.classList.remove('hidden'); t.classList.add('flex');
    clearTimeout(t._t); t._t=setTimeout(()=>{ t.classList.add('hidden'); t.classList.remove('flex'); },duration);
  }

    document.getElementById('confirm-bar').style.width = `${Math.round(confirmed/APP.config.classes.length*100)}%`;

    APP.config.classes.forEach((c,i)=>{

    if (!APP.escalas[dateKey]) return;

    saveToStorage();
    renderProxima();
    showToast(cur==='confirmado'?'Status: Pendente':'✓ Presença confirmada!');
  }

    const months = getAvailableMonths();
    if (!currentMonth) currentMonth = months.find(m=>m>=new Date().toISOString().substring(0,7))||months[0];

    // Chips
    const chipsEl = document.getElementById('month-chips-container');
    chipsEl.innerHTML = months.map(m=>`
      <button class="month-chip ${m===currentMonth?'active':''}" onclick="selectMonth('${m}')">
        ${fmtMonthLabel(m)}
      </button>`).join('');

    renderMesList();
  }

  function selectMonth(ym) {
    currentMonth = ym;
    renderMes();
  }

  function renderMesList() {
    const list = document.getElementById('mes-list');
    list.innerHTML='';
    if (!currentMonth) return;

    const sundays = getSundaysOfMonth(currentMonth);

    // Also include any manually added escalas in this month not in natural sundays
    const extraKeys = Object.keys(APP.escalas).filter(k=>k.startsWith(currentMonth+'-')&&!sundays.includes(k));
    const allDays = [...new Set([...sundays,...extraKeys])].sort();

    if (!allDays.length) {
      list.innerHTML=`<div class="text-center py-12"><div class="text-4xl opacity-30">📅</div><p class="text-stone-400 mt-3 text-sm">Nenhum domingo neste mês</p></div>`;

      const e = APP.escalas[k];
      const confirmed = APP.config.classes.filter(c=>e[c.id]?.status==='confirmado').length;
      const past = k < toIso(new Date());
      const card=document.createElement('div');
      card.className=`card px-5 py-4 fade-up`;
      card.style.animationDelay=`${.06*i}s`;

      const rows = APP.config.classes.map(c=>{

      card.innerHTML=`

          <div>
            <p class="font-serif text-base text-stone-900">${fmtShort(k)}</p>
            <p class="text-xs text-stone-400 mt-0.5">${daysUntil(k)}</p>

            <p class="font-semibold text-stone-900">${c.label}</p>
            <p class="text-xs text-stone-500 mt-0.5">${histCount} registro${histCount!==1?'s':''} no histórico</p>
          </div>
          <div class="flex items-center gap-2">
            ${isAdmin()?`<button onclick="event.stopPropagation();editClass('${c.id}')" class="btn-ghost py-1 px-2 text-xs">✏️</button>`:''}
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#a8a29e" stroke-width="2" stroke-linecap="round"><path d="M9 18l6-6-6-6"/></svg>
          </div>
        </div>
      `;
      card.addEventListener('click',()=>openClassDetail(c));
      list.appendChild(card);
    });
  }

  function openClassDetail(c) {
    const history=APP.historico.filter(h=>h[c.id]);
    const rows=history.length
      ? [...history].reverse().map(h=>{
          const s=h[c.id];
          return `<div class="flex items-center justify-between py-2.5 border-b border-stone-100 last:border-0">
            <div><p class="text-sm font-medium text-stone-800">${s.professor||'—'}</p>
                 <p class="text-xs text-stone-400">${fmtShort(h.date)}</p></div>
            ${statusBadge(s.status)}</div>`;
        }).join('')
      : `<p class="text-sm text-stone-400 py-6 text-center italic">Sem registros ainda.<br>O histórico aparecerá aqui após cada EBD.</p>`;

    openSheet(`
      <div class="flex items-center gap-4 mb-5">
        <div class="w-14 h-14 rounded-2xl flex items-center justify-center text-3xl" style="background:${c.color}22">${c.emoji}</div>
        <div>
          <h2 class="font-serif text-xl text-stone-900">${c.label}</h2>
          <p class="text-sm text-stone-400">Histórico de professores</p>
        </div>
      </div>
      <div>${rows}</div>
    `);
  }

  function editClass(id) {
    const c=APP.config.classes.find(x=>x.id===id);
    openSheet(`
      <h2 class="font-serif text-xl text-stone-900 mb-1">Editar Classe</h2>
      <p class="text-sm text-stone-400 mb-5">Altere as informações da turma</p>
      <label class="block text-xs font-semibold text-stone-500 uppercase tracking-widest mb-2">Nome da Classe</label>
      <input id="cls-label" class="inp mb-4" value="${c.label}" />
      <label class="block text-xs font-semibold text-stone-500 uppercase tracking-widest mb-2">Emoji</label>
      <input id="cls-emoji" class="inp mb-4" value="${c.emoji}" maxlength="4" />
      <label class="block text-xs font-semibold text-stone-500 uppercase tracking-widest mb-2">Cor (hex)</label>
      <input id="cls-color" class="inp mb-5" type="color" value="${c.color}" style="height:48px;padding:4px 8px" />
      <div class="flex gap-2">
        <button class="btn-ghost flex-1 text-rose-500" onclick="deleteClass('${id}')">Excluir Classe</button>
        <button class="btn-primary flex-1" onclick="saveClass('${id}')">Salvar</button>
      </div>
    `);
  }

  function saveClass(id) {
    const c=APP.config.classes.find(x=>x.id===id);
    c.label=document.getElementById('cls-label').value.trim()||c.label;
    c.emoji=document.getElementById('cls-emoji').value.trim()||c.emoji;
    c.color=document.getElementById('cls-color').value||c.color;
    saveToStorage();
    closeSheet();
    renderClasses();
    showToast('✓ Classe atualizada!');
  }

  function deleteClass(id) {
    if (!confirm('Excluir esta classe? Esta ação não pode ser desfeita.')) return;
    APP.config.classes=APP.config.classes.filter(c=>c.id!==id);
    saveToStorage();
    closeSheet();
    renderClasses();
    showToast('Classe excluída');
  }

  function openAddClass() {
    const newId='cls_'+Date.now();
    openSheet(`
      <h2 class="font-serif text-xl text-stone-900 mb-1">Nova Classe</h2>
      <p class="text-sm text-stone-400 mb-5">Adicione uma nova turma à EBD</p>
      <label class="block text-xs font-semibold text-stone-500 uppercase tracking-widest mb-2">Nome da Classe</label>
      <input id="ncls-label" class="inp mb-4" placeholder="Ex: Berçário" />
      <label class="block text-xs font-semibold text-stone-500 uppercase tracking-widest mb-2">Emoji</label>
      <input id="ncls-emoji" class="inp mb-4" placeholder="🌟" maxlength="4" />
      <label class="block text-xs font-semibold text-stone-500 uppercase tracking-widest mb-2">Cor</label>
      <input id="ncls-color" class="inp mb-5" type="color" value="#4e7e52" style="height:48px;padding:4px 8px" />
      <button class="btn-primary" onclick="confirmAddClass('${newId}')">Adicionar Classe</button>
    `);
  }

  function confirmAddClass(id) {
    const label=document.getElementById('ncls-label').value.trim();
    if (!label) { showToast('⚠ Digite o nome da classe'); return; }
    APP.config.classes.push({
      id, label,
      emoji: document.getElementById('ncls-emoji').value.trim()||'📚',
      color: document.getElementById('ncls-color').value||'#4e7e52'
    });
    saveToStorage();
    closeSheet();
    renderClasses();
    showToast('✓ Classe adicionada!');
  }

  /* ================================================================
     RENDER: CONFIG
  ================================================================ */
  function renderConfig() {
    const f=document.getElementById('config-form');
    f.innerHTML=`
      <div class="card px-5 py-4 fade-up">
        <h3 class="font-serif text-base text-stone-900 mb-4">Configurações Gerais</h3>
        <label class="block text-xs font-semibold text-stone-500 uppercase tracking-widest mb-2">Nome da Igreja</label>
        <input id="cfg-nome" class="inp mb-4" value="${APP.config.igrejaNome||''}" placeholder="Ex: Igreja EBD" />
        <label class="block text-xs font-semibold text-stone-500 uppercase tracking-widest mb-2">Horário da EBD</label>
        <input id="cfg-horario" class="inp mb-4" type="time" value="${APP.config.horario||'09:00'}" />
        <label class="block text-xs font-semibold text-stone-500 uppercase tracking-widest mb-2">Dia da Semana</label>
        <select id="cfg-dia" class="inp mb-5" style="background:#fff">
          ${['Domingo','Segunda','Terça','Quarta','Quinta','Sexta','Sábado'].map((d,i)=>`<option value="${i}" ${APP.config.diaSemana===i?'selected':''}>${d}</option>`).join('')}
        </select>
        <button class="btn-primary" onclick="saveGeneralConfig()">💾 Salvar Configurações</button>
      </div>

      <div class="card px-5 py-4 fade-up delay-1">
        <h3 class="font-serif text-base text-stone-900 mb-4">Segurança</h3>
        <label class="block text-xs font-semibold text-stone-500 uppercase tracking-widest mb-2">PIN de Admin (atual: ${APP.config.adminPin||'1234'})</label>
        <input id="cfg-pin" class="inp mb-4" type="password" placeholder="Novo PIN..." maxlength="8" />
        <button class="btn-primary" onclick="changePin()">🔐 Alterar PIN</button>
      </div>

      <div class="card px-5 py-4 fade-up delay-2">
        <h3 class="font-serif text-base text-stone-900 mb-3">Registrar Histórico</h3>
        <p class="text-sm text-stone-500 mb-4">Mover a escala de um domingo passado para o histórico oficial</p>
        <button class="btn-ghost w-full text-sage-700" onclick="archiveEscala()">📦 Arquivar EBD Realizada</button>
      </div>

      <div class="card px-5 py-4 fade-up delay-3">
        <h3 class="font-serif text-base text-stone-900 mb-3">Acesso dos Professores</h3>
        <p class="text-sm text-stone-500 mb-3">Professores acessam o app pelo mesmo link. Para entrar no modo deles, basta tocar em <strong>"Admin"</strong> no topo e escolher o próprio nome.</p>
        <div class="bg-sage-50 rounded-2xl px-4 py-3 text-xs text-sage-700 font-medium">
          💡 Os dados são compartilhados em tempo real — qualquer professor vê as escalas atualizadas instantaneamente.
        </div>
      </div>
    `;
  }

  function saveGeneralConfig() {
    APP.config.igrejaNome = document.getElementById('cfg-nome').value.trim()||'Igreja EBD';
    APP.config.horario    = document.getElementById('cfg-horario').value||'09:00';
    APP.config.diaSemana  = parseInt(document.getElementById('cfg-dia').value)||0;
    saveToStorage();
    renderProxima();
    showToast('✓ Configurações salvas!');
  }

  function changePin() {
    const val=document.getElementById('cfg-pin').value.trim();
    if (!val) { showToast('⚠ Digite um PIN'); return; }
    APP.config.adminPin=val;
    saveToStorage();
    document.getElementById('cfg-pin').value='';
    renderConfig();
    showToast('✓ PIN alterado com sucesso!');
  }

  function archiveEscala() {
    // Show list of past escalas not yet in historico
    const histDates=APP.historico.map(h=>h.date);
    const today=toIso(new Date());
    const past=Object.keys(APP.escalas).filter(k=>k<today&&!histDates.includes(k)).sort().reverse();

    if (!past.length) {
      showToast('ℹ Nenhuma escala passada para arquivar');
      return;
    }

    openSheet(`
      <h2 class="font-serif text-xl text-stone-900 mb-1">Arquivar EBD</h2>
      <p class="text-sm text-stone-400 mb-5">Mover para o histórico oficial</p>
      <div class="space-y-2">
        ${past.map(k=>`
          <button onclick="confirmArchive('${k}')" class="w-full flex items-center justify-between px-4 py-3 rounded-2xl border-2 border-stone-100 hover:border-sage-300 transition-all">
            <div class="text-left">
              <p class="font-semibold text-stone-800">${fmtShort(k)}</p>
              <p class="text-xs text-stone-400">${APP.config.classes.filter(c=>APP.escalas[k]?.[c.id]?.status==='confirmado').length}/${APP.config.classes.length} confirmados</p>
            </div>
            <span class="text-xs font-semibold text-sage-600">Arquivar →</span>
          </button>`).join('')}
      </div>
    `);
  }

  function confirmArchive(key) {
    const escala=APP.escalas[key];
    if (!escala) return;
    const entry={ date:key };
    APP.config.classes.forEach(c=>{ entry[c.id]=escala[c.id]||{professor:'',status:'disponivel'}; });
    entry.obs=escala.obs||'';
    APP.historico.push(entry);
    APP.historico.sort((a,b)=>a.date.localeCompare(b.date));
    delete APP.escalas[key];
    saveToStorage();
    closeSheet();
    renderConfig();
    showToast('✓ Escala arquivada no histórico!');
  }

  /* ================================================================
     EDIT SLOT
  ================================================================ */
  function editSlot(dateKey, classId) {
    const c=APP.config.classes.find(x=>x.id===classId);
    const slot=APP.escalas[dateKey]?.[classId]||{professor:'',status:'pendente'};
    let _sel=slot.status;
    openSheet(`
      <h2 class="font-serif text-xl text-stone-900 mb-1">${c.emoji} ${c.label}</h2>
      <p class="text-sm text-stone-400 mb-5">${fmtDate(dateKey)}</p>
      <label class="block text-xs font-semibold text-stone-500 uppercase tracking-widest mb-2">Professor(a)</label>
      <input id="inp-professor" class="inp mb-5" placeholder="Nome do professor..." value="${slot.professor}" />
      <label class="block text-xs font-semibold text-stone-500 uppercase tracking-widest mb-3">Status</label>
      <div class="grid grid-cols-2 gap-2 mb-6" id="status-options">
        ${['confirmado','pendente','disponivel','ausente'].map(s=>`
          <button onclick="selectStatus_slot('${s}')" data-status="${s}"
            class="status-opt flex items-center gap-2 px-4 py-3 rounded-2xl border-2 text-sm font-semibold transition-all
            ${s===slot.status?'border-stone-900 bg-stone-900 text-white':'border-stone-200 text-stone-700'}">
            ${s==='confirmado'?'✓ Confirmado':s==='pendente'?'⏳ Pendente':s==='disponivel'?'○ Disponível':'✗ Ausente'}
          </button>`).join('')}
      </div>
      <button class="btn-primary" onclick="saveSlot('${dateKey}','${classId}')">Salvar Escala</button>
    `);
  }

  let _slotStatus=null;
  function selectStatus_slot(s) {
    _slotStatus=s;
    document.querySelectorAll('.status-opt').forEach(b=>{
      const a=b.dataset.status===s;
      b.className=b.className.replace(/border-stone-\S+|bg-stone-\S+|text-white|text-stone-700/g,'');
      b.classList.add(a?'border-stone-900':'border-stone-200');
      b.classList.add(a?'bg-stone-900':'');
      b.classList.add(a?'text-white':'text-stone-700');
    });
  }

  function saveSlot(dateKey, classId) {
    if (!APP.escalas[dateKey]) { APP.escalas[dateKey]={ date:dateKey }; }
    const prof=document.getElementById('inp-professor').value.trim();
    const status=_slotStatus||APP.escalas[dateKey]?.[classId]?.status||'pendente';
    APP.escalas[dateKey][classId]={ professor:prof, status };
    saveToStorage();
    closeSheet();
    renderProxima();
    showToast('✓ Escala salva!');
  }

  /* ================================================================
     EDIT ESCALA COMPLETA (from month view)
  ================================================================ */
  function editEscalaCompleta(key) {
    const e=APP.escalas[key]||{ date:key };
    openSheet(`
      <h2 class="font-serif text-xl text-stone-900 mb-1">Escala Completa</h2>
      <p class="text-sm text-stone-400 mb-5">${fmtDate(key)}</p>
      ${APP.config.classes.map(c=>`
        <div class="mb-4">
          <label class="flex items-center gap-2 text-xs font-semibold text-stone-500 uppercase tracking-widest mb-2">
            <span>${c.emoji}</span> ${c.label}
          </label>
          <div class="flex gap-2">
            <input id="inp-${c.id}-prof" class="inp flex-1" placeholder="Nome do professor..." value="${e[c.id]?.professor||''}" />
            <select id="inp-${c.id}-stat" class="inp" style="background:#fff;max-width:140px">
              ${['pendente','confirmado','disponivel','ausente'].map(s=>`<option value="${s}" ${(e[c.id]?.status||'pendente')===s?'selected':''}>${s.charAt(0).toUpperCase()+s.slice(1)}</option>`).join('')}
            </select>
          </div>
        </div>`).join('')}
      <label class="block text-xs font-semibold text-stone-500 uppercase tracking-widest mb-2 mt-2">Observação</label>
      <textarea id="inp-obs-esc" rows="3" placeholder="Avisos especiais para este domingo..."
        class="inp mb-5 resize-none">${e.obs||''}</textarea>
      <div class="flex gap-2">
        <button class="btn-ghost flex-1" onclick="closeSheet()">Cancelar</button>
        <button class="btn-primary flex-1" onclick="saveEscalaCompleta('${key}')">💾 Salvar Tudo</button>
      </div>
    `);
  }

  function saveEscalaCompleta(key) {
    if (!APP.escalas[key]) APP.escalas[key]={ date:key };
    APP.config.classes.forEach(c=>{
      APP.escalas[key][c.id]={
        professor: document.getElementById(`inp-${c.id}-prof`)?.value.trim()||'',
        status:    document.getElementById(`inp-${c.id}-stat`)?.value||'pendente',
      };
    });
    APP.escalas[key].obs=document.getElementById('inp-obs-esc')?.value.trim()||'';
    saveToStorage();
    closeSheet();
    renderMes();
    showToast('✓ Escala completa salva!');
  }

  /* ================================================================
     ADD NOVA ESCALA (FAB)
  ================================================================ */
  function openAddEscala() {
    const key=getNextEBD();
    editEscalaCompleta(key);
  }

  /* ================================================================
     EDIT CONFIG shortcut
  ================================================================ */
  function editConfig() {
    if (!isAdmin()) { showToast('⚠ Acesso apenas para administrador'); return; }
    openSheet(`
      <h2 class="font-serif text-xl text-stone-900 mb-1">Horário & Dia</h2>
      <p class="text-sm text-stone-400 mb-5">Configure o horário da EBD</p>
      <label class="block text-xs font-semibold text-stone-500 uppercase tracking-widest mb-2">Horário</label>
      <input id="ec-horario" class="inp mb-4" type="time" value="${APP.config.horario||'09:00'}" />
      <label class="block text-xs font-semibold text-stone-500 uppercase tracking-widest mb-2">Dia da Semana</label>
      <select id="ec-dia" class="inp mb-5" style="background:#fff">
        ${['Domingo','Segunda','Terça','Quarta','Quinta','Sexta','Sábado'].map((d,i)=>`<option value="${i}" ${APP.config.diaSemana===i?'selected':''}>${d}</option>`).join('')}
      </select>
      <button class="btn-primary" onclick="saveQuickConfig()">Salvar</button>
    `);
  }

  function saveQuickConfig() {
    APP.config.horario=document.getElementById('ec-horario').value||'09:00';
    APP.config.diaSemana=parseInt(document.getElementById('ec-dia').value)||0;
    saveToStorage();
    closeSheet();
    renderProxima();
    showToast('✓ Horário atualizado!');
  }

  /* ================================================================
     OBSERVAÇÃO
  ================================================================ */
  function editObservacao() {
    openSheet(`
      <h2 class="font-serif text-xl text-stone-900 mb-1">Observação Geral</h2>
      <p class="text-sm text-stone-400 mb-5">Informações para toda a equipe</p>
      <textarea id="inp-obs" rows="5" placeholder="Ex: Abertura: classe Soldadinhos. Encerramento: oração coletiva."
        class="inp mb-5 resize-none">${APP.config.observacao||''}</textarea>
      <button class="btn-primary" onclick="saveObservacao()">Salvar Observação</button>
    `);
  }

  function saveObservacao() {
    APP.config.observacao=document.getElementById('inp-obs').value.trim();
    saveToStorage();
    closeSheet();
    renderProxima();
    showToast('✓ Observação salva!');
  }

  /* ================================================================
     SEARCH
  ================================================================ */
  function openSearch() {
    openSheet(`
      <h2 class="font-serif text-xl text-stone-900 mb-5">Buscar Escalas</h2>
      <input id="search-inp" class="inp mb-4" type="search" placeholder="Nome do professor ou data..."
        oninput="doSearch(this.value)" autofocus />
      <div id="search-results" class="text-sm text-stone-400 text-center pt-4 italic">Digite para buscar…</div>
    `);
    setTimeout(()=>document.getElementById('search-inp')?.focus(),300);
  }

  function doSearch(q) {
    const res=document.getElementById('search-results');
    if (!q.trim()) { res.innerHTML='<p class="italic text-stone-400 text-center pt-4">Digite para buscar…</p>'; return; }
    const matches=[];
    const all=[...APP.historico,...Object.values(APP.escalas)];
    all.forEach(e=>{
      APP.config.classes.forEach(c=>{
        const s=e[c.id];
        if (s?.professor?.toLowerCase().includes(q.toLowerCase())) {
          matches.push(`<div class="card px-4 py-3 flex items-center justify-between mb-2">
            <div><p class="font-medium text-stone-800">${s.professor}</p>
                 <p class="text-xs text-stone-400">${c.emoji} ${c.label} · ${fmtShort(e.date)}</p></div>
            ${statusBadge(s.status)}</div>`);
        }
      });
    });
    res.innerHTML=matches.length?matches.join(''):'<p class="italic text-stone-400 text-center pt-4">Nenhum resultado</p>';
  }

  /* ================================================================
     SHEET HELPERS
  ================================================================ */
  function openSheet(html) {
    _slotStatus=null;
    const overlay=document.getElementById('modal-overlay');
    const sheet=document.getElementById('bottom-sheet');
    document.getElementById('sheet-content').innerHTML=html;
    overlay.classList.remove('hidden'); overlay.classList.add('flex');
    sheet.classList.add('slide-up');
    setTimeout(()=>sheet.classList.remove('slide-up'),400);
  }

  function closeSheet(e) {
    if (e&&e.target!==document.getElementById('modal-overlay')) return;
    document.getElementById('modal-overlay').classList.add('hidden');
    document.getElementById('modal-overlay').classList.remove('flex');
  }

  /* ================================================================
     INIT
  ================================================================ */
  async function init() {
    await loadFromStorage();
    updateAdminVisibility();
    renderProxima();

    // Set current month
    const now=new Date();
    currentMonth=`${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}`;
  }

  init();
  </script>
</body>
</html>
